---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: clusterspecterconfigs.config.joluc.de
spec:
  group: config.joluc.de
  names:
    kind: ClusterSpecterConfig
    listKind: ClusterSpecterConfigList
    plural: clusterspecterconfigs
    shortNames:
    - csc
    singular: clusterspecterconfig
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - description: Number of enabled templates
      jsonPath: .status.templateCount
      name: Templates
      type: integer
    - description: Rules using this config
      jsonPath: .status.processedRulesCount
      name: Namespaces
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: "ClusterSpecterConfig is the Schema for the cluster-scoped Specter
          configuration.\nIt defines organization-wide URL templates that serve as
          defaults for all namespaces.\n\nUSAGE:\n\n 1. Platform/SRE team creates
          a ClusterSpecterConfig with default templates\n 2. All PrometheusRules with
          specter.joluc.de/enabled: \"true\" get these templates\n 3. Teams can override
          by creating namespace-scoped SpecterConfig resources\n\nEXAMPLE:\n\n\tapiVersion:
          config.joluc.de/v1alpha1\n\tkind: ClusterSpecterConfig\n\tmetadata:\n\t
          \ name: global  # Convention: use \"global\" for the primary cluster config\n\tspec:\n\t
          \ templates:\n\t    logs:\n\t      url: \"https://opensearch.company.io/logs?service={{.service}}\"\n\t
          \     description: \"View logs in central OpenSearch\"\n\t    metrics:\n\t
          \     url: \"https://grafana.company.io/d/overview?var-service={{.service}}\"\n\t
          \     description: \"View service dashboard in Grafana\"\n\t  defaultLabels:\n\t
          \   environment: \"production\"\n\t  shortener:\n\t    enabled: true\n\t
          \   baseURL: \"https://specter.company.io\""
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired cluster-wide configuration.
            properties:
              defaultLabels:
                additionalProperties:
                  type: string
                description: |-
                  DefaultLabels are fallback values used when a label is not present on alerts.
                  These apply cluster-wide.
                type: object
              selector:
                description: |-
                  Selector allows targeting specific PrometheusRules cluster-wide.
                  If empty, applies to all rules with specter.joluc.de/enabled: "true".
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              shortener:
                description: Shortener configures the cluster-wide URL shortening
                  service.
                properties:
                  baseURL:
                    description: |-
                      BaseURL is the external URL where Specter's shortener endpoint is accessible.
                      This is typically exposed via an Ingress or LoadBalancer Service.

                      Example: "https://specter.mycompany.io"

                      The short URLs will be: {BaseURL}/s/{shortId}
                    type: string
                  enabled:
                    default: false
                    description: |-
                      Enabled toggles URL shortening. When enabled, URLs exceeding MaxURLLength
                      are replaced with short redirect links.

                      The shortener stores URLs in memory with automatic expiration.
                      Short links look like: https://specter.mycompany.io/s/abc123
                    type: boolean
                  maxURLLength:
                    default: 200
                    description: |-
                      MaxURLLength is the threshold above which URLs are shortened.
                      URLs shorter than this value are left unchanged to avoid unnecessary redirects.

                      Recommended values:
                        - 200: Conservative, shortens most observability URLs
                        - 500: Only shortens very long URLs (OpenSearch with complex queries)
                        - 2000: Only shortens extremely long URLs
                    minimum: 50
                    type: integer
                  ttl:
                    default: 168h
                    description: |-
                      TTL is the time-to-live for shortened URLs in Go duration format.
                      After this duration, the short URL expires and returns 404.

                      Examples: "24h", "168h" (7 days), "720h" (30 days)
                    type: string
                type: object
              templates:
                additionalProperties:
                  description: |-
                    TemplateConfig defines a single URL template and its configuration.
                    Each template generates one diagnostic link that will be added to alerts.
                  properties:
                    description:
                      description: |-
                        Description is a human-readable explanation of what this link shows.
                        This appears in alert notifications to help on-call engineers understand
                        what they'll see when clicking the link.

                        Good descriptions are action-oriented:
                          - "View application logs filtered by service"
                          - "Open Grafana dashboard showing error rates"
                          - "Search distributed traces for this service"
                      type: string
                    enabled:
                      default: true
                      description: |-
                        Enabled allows temporarily disabling a template without removing it.
                        Useful for maintenance or testing. Defaults to true if not specified.
                      type: boolean
                    requiredLabels:
                      description: |-
                        RequiredLabels specifies labels that must exist for this template to apply.
                        If any required label is missing from an alert, the template is skipped.

                        USE CASE: Some templates only make sense when certain data is available.
                        For example, a trace link requires a traceId label:

                          templates:
                            trace-by-id:
                              url: "https://jaeger.io/trace/{{.traceId}}"
                              requiredLabels: ["traceId"]
                              description: "View the specific trace that triggered this alert"

                        If an alert doesn't have traceId, this template is silently skipped.
                      items:
                        type: string
                      type: array
                    severity:
                      description: |-
                        Severity filters which alert severities receive this template.
                        If empty, the template applies to all severities.
                        If specified, only alerts with a matching severity label get this link.

                        USE CASE: You might want expensive APM trace links only for critical alerts,
                        while cheaper log links go to all alerts:

                          templates:
                            logs:
                              url: "https://logs.io/..."
                              # No severity filter - applies to all alerts
                            traces:
                              url: "https://expensive-apm.io/..."
                              severity: ["critical", "page"]  # Only for high-severity alerts
                      items:
                        type: string
                      type: array
                    url:
                      description: |-
                        URL is a Go text/template string that renders to a diagnostic URL.

                        TEMPLATE VARIABLES:
                        All labels from the PrometheusRule alert are available as variables:
                          - {{.service}}     - The service label
                          - {{.namespace}}   - The namespace label
                          - {{.alertname}}   - The name of the alert
                          - {{.severity}}    - The severity label (if present)
                          - Any other label defined on the alert

                        TEMPLATE FUNCTIONS (built-in helpers):
                          String manipulation:
                          - {{.service | urlEncode}}         - URL-encode special characters
                          - {{.service | lower}}             - Convert to lowercase
                          - {{.service | upper}}             - Convert to uppercase
                          - {{.service | replace "-" "_"}}   - Replace characters
                          - {{.team | default "platform"}}   - Provide fallback for missing labels

                          Time functions:
                          - {{now}}                          - Current Unix timestamp
                          - {{nowRFC3339}}                   - Current time in RFC3339 format

                          Query escaping:
                          - {{.query | kueryEscape}}         - Escape for Kibana Query Language

                        EXAMPLE TEMPLATES:

                        Simple Grafana dashboard:
                          https://grafana.io/d/abc123?var-service={{.service | urlEncode}}

                        OpenSearch with KQL query:
                          https://opensearch.io/_dashboards/app/discover#/?_a=(query:(language:kuery,query:'service:"{{.service | kueryEscape}}"'))

                        Jaeger trace search:
                          https://jaeger.io/search?service={{.service}}&lookback=1h

                        Conditional based on environment:
                          {{if eq .env "production"}}https://prod.grafana.io{{else}}https://staging.grafana.io{{end}}/d/{{.dashboard}}
                      minLength: 1
                      type: string
                  required:
                  - url
                  type: object
                description: |-
                  Templates is a map of template names to their configurations.
                  These templates apply cluster-wide as defaults.
                type: object
            type: object
          status:
            description: Status defines the observed state.
            properties:
              conditions:
                description: Conditions represent the latest observations of the config's
                  state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              namespacesUsing:
                description: |-
                  NamespacesUsing lists namespaces that are using this cluster config
                  (i.e., namespaces without their own SpecterConfig).
                items:
                  type: string
                type: array
              processedRulesCount:
                description: |-
                  ProcessedRulesCount is the total number of PrometheusRules processed
                  using this cluster config (where no namespace config overrides).
                type: integer
              templateCount:
                description: TemplateCount is the number of enabled templates in this
                  config.
                type: integer
              validationErrors:
                description: ValidationErrors contains any template parsing errors.
                items:
                  type: string
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
