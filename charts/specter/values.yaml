# Default values for specter

# Image configuration
image:
  repository: ghcr.io/joluc/specter
  tag: ""  # Defaults to appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Number of replicas
replicaCount: 1

# Controller configuration
controller:
  # Log level: debug, info, warn, error
  logLevel: info
  # Log format: json or text
  logFormat: json
  # Enable leader election (required for HA)
  leaderElection: true

# URL shortener configuration
shortener:
  # Enable the URL shortener (stateless compression-based)
  enabled: false
  # Base URL for short links (required if enabled)
  baseURL: ""

# Metrics configuration
metrics:
  # Enable metrics endpoint
  enabled: true
  # Metrics bind address
  bindAddress: ":8443"
  # Use HTTPS for metrics
  secure: true

# Health probes
healthProbes:
  bindAddress: ":8081"

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Service account
serviceAccount:
  # Create a service account
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account (generated if not set)
  name: ""

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Security context for the pod
podSecurityContext:
  runAsNonRoot: true

# Security context for the container
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# RBAC configuration
rbac:
  # Create RBAC resources
  create: true

# Ingress configuration for shortener redirects
ingress:
  # Enable ingress
  enabled: false
  # Ingress class name
  className: ""
  # Ingress annotations
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  # Ingress hosts
  hosts:
    - host: specter.example.com
      paths:
        - path: /s
          pathType: Prefix
  # TLS configuration
  tls: []
    # - secretName: specter-tls
    #   hosts:
    #     - specter.example.com

# ClusterSpecterConfig - Global configuration for URL templates
clusterConfig:
  # Enable ClusterSpecterConfig creation
  enabled: false
  # Name of the ClusterSpecterConfig resource
  name: global
  # URL templates for diagnostic links
  templates: {}
    # logs:
    #   url: "https://logs.example.com/..."
    #   description: "View logs"
    # dashboard:
    #   url: "https://grafana.example.com/..."
    #   description: "View dashboard"
  # Default labels injected into all template contexts
  defaultLabels: {}
    # environment: "production"
    # indexPattern: "logs-*"
  # URL shortener configuration
  shortener:
    enabled: false
    maxURLLength: 200
