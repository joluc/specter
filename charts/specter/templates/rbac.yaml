{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "specter.fullname" . }}-manager-role
  labels:
    {{- include "specter.labels" . | nindent 4 }}
rules:
# SpecterConfig permissions
- apiGroups:
  - config.joluc.de
  resources:
  - specterconfigs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - config.joluc.de
  resources:
  - specterconfigs/finalizers
  verbs:
  - update
- apiGroups:
  - config.joluc.de
  resources:
  - specterconfigs/status
  verbs:
  - get
  - patch
  - update
# ClusterSpecterConfig permissions
- apiGroups:
  - config.joluc.de
  resources:
  - clusterspecterconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - config.joluc.de
  resources:
  - clusterspecterconfigs/status
  verbs:
  - get
  - patch
  - update
# PrometheusRule permissions
- apiGroups:
  - monitoring.coreos.com
  resources:
  - prometheusrules
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - monitoring.coreos.com
  resources:
  - prometheusrules/status
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "specter.fullname" . }}-manager-rolebinding
  labels:
    {{- include "specter.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "specter.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "specter.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
# Leader election role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "specter.fullname" . }}-leader-election-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "specter.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "specter.fullname" . }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "specter.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "specter.fullname" . }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "specter.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
