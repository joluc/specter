apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "specter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "specter.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "specter.selectorLabels" . | nindent 6 }}
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "specter.selectorLabels" . | nindent 8 }}
        control-plane: controller-manager
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "specter.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 10
      containers:
      - name: manager
        image: "{{ .Values.image.repository }}:{{ include "specter.imageTag" . }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        args:
        - --leader-elect={{ .Values.controller.leaderElection }}
        - --health-probe-bind-address={{ .Values.healthProbes.bindAddress }}
        {{- if .Values.metrics.enabled }}
        - --metrics-bind-address={{ .Values.metrics.bindAddress }}
        - --metrics-secure={{ .Values.metrics.secure }}
        {{- else }}
        - --metrics-bind-address=0
        {{- end }}
        - --log-level={{ .Values.controller.logLevel }}
        - --log-format={{ .Values.controller.logFormat }}
        {{- if .Values.shortener.enabled }}
        - --shortener-base-url={{ .Values.shortener.baseURL }}
        - --shortener-ttl={{ .Values.shortener.ttl }}
        {{- end }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        {{- if .Values.metrics.enabled }}
        - containerPort: 8443
          name: metrics
          protocol: TCP
        {{- end }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
